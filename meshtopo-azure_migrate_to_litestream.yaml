  template:
    containers:
    - env:
      - name: TZ
        value: America/Anchorage
      - name: CONFIG_PATH
        value: /app/config/config.yaml
      - name: AZURE_LITESTREAM
        value: "true"
      - name: AZURE_STORAGE_ACCOUNT
