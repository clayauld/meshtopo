        secretRef: azure-storage-key
      image: ghcr.io/clayauld/meshtopo:latest
      name: meshtopo-gateway
      resources:
        cpu: 0.4
        ephemeralStorage: 4Gi
        memory: 0.8Gi
      volumeMounts:
      - mountPath: /app/config/config.yaml
        subPath: config.yaml
        volumeName: mosquitto-config
      - mountPath: /app/data
        volumeName: meshtopo-data
    - image: eclipse-mosquitto:2.0
      name: mosquitto
      resources:
        cpu: 0.4
        ephemeralStorage: 4Gi
        memory: 0.8Gi
      volumeMounts:
      - mountPath: /mosquitto/data
        volumeName: mosquitto-data
      - mountPath: /mosquitto/log
        volumeName: mosquitto-log
      - mountPath: /mosquitto/config
        volumeName: mosquitto-writable-config
    - command:
      - traefik
      - --providers.file.filename=/etc/traefik/dynamic_conf.yaml
      - --log.level=DEBUG
      - --entrypoints.mqttsecure.address=:8883
      - --certificatesresolvers.myresolver.acme.dnschallenge=true
      - --certificatesresolvers.myresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.myresolver.acme.email=secretary@amrg.org
      - --certificatesresolvers.myresolver.acme.storage=/data/acme_prod.json
      env:
      - name: CF_DNS_API_TOKEN
        value: X-gycjpBlX9JlQvOZCEb085jMgWH-IBH_m1T1TM2
      - name: CF_API_EMAIL
        value: secretary@amrg.org
      image: traefik:v3.6.8
      name: traefik
      resources:
        cpu: 0.15
        ephemeralStorage: 1Gi
        memory: 0.3Gi
      volumeMounts:
      - mountPath: /etc/traefik/dynamic_conf.yaml
        subPath: traefik_dynamic.yaml
        volumeName: mosquitto-config
      - mountPath: /data
        volumeName: mosquitto-certs-data
    - command:
      - sh
      - -c
      - "while true; do\n  if [ -f /data/acme_prod.json ]; then\n    echo \"[$(date)]\
        \ Syncing acme_prod.json...\"\n    cp /data/acme_prod.json /mnt/certs/acme_prod.json\n\
        \  else\n    echo \"[$(date)] acme_prod.json not found in /data\"\n  fi\n\
        \  sleep 60\ndone\n"
      image: busybox
      name: cert-sync
      resources:
        cpu: 0.05
        ephemeralStorage: 1Gi
        memory: 0.1Gi
      volumeMounts:
      - mountPath: /data
        volumeName: mosquitto-certs-data
      - mountPath: /mnt/certs
        volumeName: mosquitto-certs-backup
    initContainers:
    - command:
      - sh
      - -c
      - "# Copy config files\ncp /mnt/source/mosquitto.conf /mosquitto/config/mosquitto.conf\n\
        if [ -f /mnt/source/passwd ]; then\n  cp /mnt/source/passwd /mosquitto/config/passwd\n\
        elif [ -f /mnt/source/passwd.conf ]; then\n  cp /mnt/source/passwd.conf /mosquitto/config/passwd\n\
        else\n  echo \"Password file not found!\"\n  exit 1\nfi\n\n# Set permissions\
        \ for Mosquitto config\nchown -R 1883:1883 /mosquitto/config\nchmod 0700 /mosquitto/config/passwd\n\
        \n# Fix permissions for persistent data (mosquitto.db)\nif [ -d /mosquitto/data\
        \ ]; then\n  chown -R 1883:1883 /mosquitto/data\nfi\nif [ -f /mosquitto/data/mosquitto.db\
        \ ]; then\n  chmod 0700 /mosquitto/data/mosquitto.db\nfi\n\n# Restore acme_prod.json\
        \ from backup if exists\nif [ -f /mnt/certs/acme_prod.json ]; then\n  cp /mnt/certs/acme_prod.json\
        \ /data/acme_prod.json\nelif [ ! -f /data/acme_prod.json ]; then\n  touch\
        \ /data/acme_prod.json\nfi\nchmod 600 /data/acme_prod.json\n"
      image: busybox
      name: init-permissions
      resources:
        cpu: 0.2
        ephemeralStorage: 2Gi
        memory: 0.5Gi
      volumeMounts:
      - mountPath: /mnt/source
        volumeName: mosquitto-config
      - mountPath: /mosquitto/config
        volumeName: mosquitto-writable-config
      - mountPath: /data
        volumeName: mosquitto-certs-data
      - mountPath: /mnt/certs
        volumeName: mosquitto-certs-backup
      - mountPath: /mosquitto/data
        volumeName: mosquitto-data
    revisionSuffix: ''
    scale:
      cooldownPeriod: 1800
      maxReplicas: 1
      minReplicas: 0
      pollingInterval: 30
      rules:
      - name: tcp-scaler
        tcp:
          metadata:
            concurrentConnections: '10'
    serviceBinds: null
    terminationGracePeriodSeconds: null
    volumes:
    - name: meshtopo-data
      storageType: EmptyDir
    - name: mosquitto-writable-config
      storageType: EmptyDir
    - name: mosquitto-data
      storageName: config-storage-link
