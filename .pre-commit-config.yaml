# Pre-commit hooks for MeshTopo Gateway Service
# Install with: pip install pre-commit && pre-commit install

repos:

  # Local hooks 1 - Generate API Documentation
  - repo: local
    hooks:
      - id: generate-docs
        name: Generate API Documentation
        entry: python3 scripts/generate_docs.py
        language: system
        always_run: true
        pass_filenames: false

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: ^(src|tests)/.*\.py$
      - id: end-of-file-fixer
        files: ^(src|tests)/.*\.py$
      - id: check-yaml
        files: \.(yaml|yml)$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: debug-statements
        files: ^(src|tests)/.*\.py$
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3
        files: ^(src|tests|scripts|config)/.*\.py$

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        files: ^(src|tests|scripts|config)/.*\.py$

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503
        files: ^(src|tests)/.*\.py$

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-PyYAML, types-requests, aiohttp, aiohttp-jinja2]
        args: [--ignore-missing-imports, --strict-optional, src/, config/]
        pass_filenames: false
  # Documentation coverage
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--config=pyproject.toml]
        exclude: ^tests/
  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-f", "screen"]
        files: ^(src|scripts|config)/.*\.py$
        exclude: ^tests/

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3009]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-e, SC1091]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--fix, --config, .markdownlint.json]

  # Conventional Commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Local hooks 2
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python3 -m pytest -m "not integration" tests/ -v --tb=short
        language: system
        pass_filenames: false
        files: ^(src/|tests/).*\.py$

      # Disabled: beads-export
      # - id: beads-export
      #   name: Export Beads issues to JSONL
      #   entry: >
      #     bash -c 'if command -v bd &> /dev/null && [[ -d .beads ]]; then
      #       echo "🔗 Exporting beads issues to JSONL..." &&
      #       bd export --format=jsonl -o .beads/issues.jsonl &&
      #       git add .beads/issues.jsonl &&
      #       echo "✓ Beads issues exported and staged";
      #     else
      #       echo "Warning: bd not found or .beads directory missing, skipping export";
      #     fi'
      #   language: system
      #   always_run: true
      #   pass_filenames: false

# Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
