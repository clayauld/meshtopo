name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      needs_release: ${{ steps.check.outputs.needs_release }}
      version: ${{ steps.check.outputs.version }}
      raw_version: ${{ steps.check.outputs.raw_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version and check tags
        id: check
        shell: bash
        run: |
          VERSION=$(grep '^version = "' pyproject.toml | cut -d'"' -f2)
          echo "Current version in pyproject.toml: $VERSION"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists."
            echo "needs_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist. Release needed."
            echo "needs_release=true" >> $GITHUB_OUTPUT
          fi
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "raw_version=$VERSION" >> $GITHUB_OUTPUT

  semantic-bump:
    needs: version-check
    if: needs.version-check.outputs.needs_release == 'false'
    runs-on: ubuntu-latest
    concurrency: release
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [version-check, semantic-bump]
    # Run if manual bump OR if semantic-bump performed an automatic bump
    if: |
      always() &&
      (
        (needs.version-check.result == 'success' && needs.version-check.outputs.needs_release == 'true') ||
        (needs.semantic-bump.result == 'success' && needs.semantic-bump.outputs.released == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ "${{ needs.version-check.outputs.needs_release }}" == "true" ]; then
            echo "version=${{ needs.version-check.outputs.version }}" >> $GITHUB_OUTPUT
            echo "raw_version=${{ needs.version-check.outputs.raw_version }}" >> $GITHUB_OUTPUT
            echo "source=manual" >> $GITHUB_OUTPUT
          else
            echo "version=${{ needs.semantic-bump.outputs.tag }}" >> $GITHUB_OUTPUT
            echo "raw_version=${{ needs.semantic-bump.outputs.version }}" >> $GITHUB_OUTPUT
            echo "source=semantic" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (Manual Only)
        if: steps.resolve.outputs.source == 'manual'
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve.outputs.version }}
          name: ${{ steps.resolve.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.resolve.outputs.raw_version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.resolve.outputs.raw_version }}
            org.opencontainers.image.revision=${{ github.sha }}
