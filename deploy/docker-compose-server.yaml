networks:
    meshtopo:
        driver: bridge

volumes:
    mosquitto_data:

services:
    # Mosquitto MQTT broker (conditional)
    mosquitto:
        image: eclipse-mosquitto:2.0
        container_name: mosquitto
        restart: unless-stopped
        ports:
            - "${MQTT_PORT:-1883}:1883"
            - "${MQTT_WS_PORT:-9001}:9001"
            - "${MQTT_TLS_PORT:-8883}:8883"
        command:
          - sh
          - -c
          - |
            cat <<EOF > /mosquitto/config/mosquitto.conf
            persistence true
            persistence_location /mosquitto/data/
            log_dest stdout
            #log_type all
            listener 1883
            protocol mqtt
            listener 8883
            certfile /mosquitto/certs/meshtopo.amrg.org.crt
            keyfile /mosquitto/certs/meshtopo.amrg.org.key
            #certfile /mosquitto/certs/wildcard_.clayauld.com.crt
            #keyfile /mosquitto/certs/wildcard_.clayauld.com.key
            listener 9001
            protocol websockets
            allow_anonymous true
            password_file /mosquitto/config/passwd
            EOF
            exec mosquitto -c /mosquitto/config/mosquitto.conf
        volumes:
            - /mnt/user/appdata/meshtopo/data:/mosquitto/data
            - /mnt/user/appdata/meshtopo/logs/mosquitto/:/mosquitto/log
            - /mnt/user/appdata/meshtopo/config.yaml:/mosquitto/config/config.yaml:ro
            - /mnt/user/appdata/meshtopo/passwd:/mosquitto/config/passwd
            #- /mnt/user/appdata/caddy/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/wildcard_.clayauld.com:/mosquitto/certs/
            - /mnt/user/appdata/caddy/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/meshtopo.amrg.org:/mosquitto/certs/
        networks:
            - meshtopo
        healthcheck:
            test: ["CMD-SHELL", "export MQTT_USER=$$(awk '/^mqtt:/{f=1} f&&/username:/{print $$2; exit}' /mosquitto/config/config.yaml) && export MQTT_PASSWORD=$$(awk '/^mqtt:/{f=1} f&&/password:/{print $$2; exit}' /mosquitto/config/config.yaml) && mosquitto_pub -h localhost -u $$MQTT_USER -P $$MQTT_PASSWORD -t test -m healthcheck"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    # Core MeshTopo gateway service
    meshtopo-gateway:
        image: ghcr.io/${GITHUB_REPOSITORY:-clayauld/meshtopo}:latest
        container_name: meshtopo-gateway
        restart: unless-stopped
        ports:
            - "8080:8080"
        volumes:
            - /mnt/user/appdata/meshtopo/config.yaml:/app/config/config.yaml:ro
            - /mnt/user/appdata/meshtopo/logs/gateway:/app/logs
            - /mnt/user/appdata/meshtopo/data:/app/data
        environment:
            - TZ=America/Anchorage
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: "0.5"
                reservations:
                    memory: 64M
                    cpus: "0.1"
        healthcheck:
            test: ["CMD", "python", "-c", "import requests; requests.get('https://caltopo.com', timeout=5)"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        networks:
            - meshtopo
        depends_on:
            - mosquitto
